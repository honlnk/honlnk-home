# 部署 honlnk-home 到 GitHub Pages
# 推送到 main → 自动构建 → 部署到 honlnk.com
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 支持手动触发
  workflow_dispatch:

# 允许 Actions 部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，避免串
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 与 package.json engines >=22.12 对齐，CI 用 LTS

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Astro
        run: pnpm build
        env:
          # configure-pages 会注入 base path，确保构建产物与 Pages 配置一致
          ASTRO_BASE: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
